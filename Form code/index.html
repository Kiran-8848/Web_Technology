<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <script src="script.js"></script>
</head>
<body>
    <!--<form method="get" action="index.html>"-->
        <form>
            <table align="center">
                <tr>
                    <td><label for="name">Name</label></td>
                    <td><input type="text" name="name" id="name" placeholder="Enter your first name" required/></td>
                </tr>
                <tr>
                    <td><label for='email'>Email ID</label></td>
                    <td><input type="email" name="email" id="email" placeholder="Enter your email" required/></td>
                </tr>
                <tr>
                    <td><label for="mobile">Mobile</label></td>
                    <td><input type="mobile" name="mobile" id="mobile" placeholder="Enter your mobile number" required/></td>
                </tr>
            </table>
        </form>
</body>
</html>
